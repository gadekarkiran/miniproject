<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodBridge — Zero Waste, Maximum Impact</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a7a4a;
    --green-light: #2ea866;
    --green-pale: #e6f7ee;
    --green-dark: #0d4a2c;
    --amber: #f59e0b;
    --amber-pale: #fef3c7;
    --coral: #ef4444;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --bg: #f0f7f3;
    --surface: #ffffff;
    --surface2: #f8fbf9;
    --text: #0d2116;
    --text2: #4a7060;
    --text3: #8aaa98;
    --border: #d4e9dc;
    --shadow: 0 2px 12px rgba(26,122,74,0.08);
    --shadow-lg: 0 8px 32px rgba(26,122,74,0.14);
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* SIDEBAR NAV */
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 240px; background: var(--green-dark); color: #fff;
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh;
    z-index: 100; transition: transform 0.3s;
  }
  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .sidebar-logo .brand { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .sidebar-logo .brand span { color: var(--green-light); }
  .sidebar-logo .tagline { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }
  .sidebar-role {
    margin: 16px; padding: 10px 12px; background: rgba(46,168,102,0.18);
    border-radius: var(--radius-sm); display: flex; align-items: center; gap: 10px;
    border: 1px solid rgba(46,168,102,0.3);
  }
  .role-badge { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; background: var(--green-light); }
  .role-name { font-size: 12px; font-weight: 600; color: #fff; }
  .role-type { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: capitalize; }
  
  .nav-section { padding: 12px 16px 4px; font-size: 9px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px; margin: 2px 8px;
    border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.7); transition: all 0.15s;
  }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.active { background: var(--green-light); color: #fff; }
  .nav-item .icon { width: 18px; text-align: center; font-size: 15px; }
  .nav-item .badge { margin-left: auto; background: var(--amber); color: #000; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
  .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); }
  .logout-btn { width: 100%; padding: 8px; background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; font-family: 'Sora', sans-serif; }

  /* MAIN CONTENT */
  .main { margin-left: 240px; flex: 1; min-height: 100vh; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 28px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .topbar-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .topbar-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .search-bar {
    display: flex; align-items: center; gap: 8px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 24px; padding: 7px 14px;
    font-size: 13px; color: var(--text2); cursor: text;
  }
  .btn {
    padding: 8px 16px; border-radius: 24px; font-family: 'Sora', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-light); transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1.5px solid var(--green); color: var(--green); }
  .btn-outline:hover { background: var(--green-pale); }
  .btn-amber { background: var(--amber); color: #000; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  
  .content { padding: 28px; }
  
  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border-radius: var(--radius); padding: 20px;
    border: 1px solid var(--border); box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .stat-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 14px; }
  .stat-icon.green { background: var(--green-pale); }
  .stat-icon.amber { background: var(--amber-pale); }
  .stat-icon.blue { background: #eff6ff; }
  .stat-icon.purple { background: #f5f3ff; }
  .stat-num { font-size: 26px; font-weight: 700; color: var(--text); font-family: 'Space Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .stat-change { font-size: 11px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
  .stat-change.up { color: var(--green); }
  .stat-change.down { color: var(--coral); }

  /* CARDS */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); }
  .card-header { padding: 18px 22px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .card-body { padding: 22px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  /* FOOD LISTING CARDS */
  .food-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .food-card {
    background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
    overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; cursor: pointer;
  }
  .food-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  .food-img { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 52px; }
  .food-img.fresh { background: linear-gradient(135deg, #d4edda 0%, #b8f0cc 100%); }
  .food-img.cooked { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
  .food-img.dairy { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); }
  .food-img.bakery { background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 100%); }
  .food-body { padding: 14px; }
  .food-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .food-meta { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .food-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
  .tag-green { background: var(--green-pale); color: var(--green-dark); }
  .tag-amber { background: var(--amber-pale); color: #92400e; }
  .tag-blue { background: #eff6ff; color: #1e40af; }
  .tag-coral { background: #fef2f2; color: #991b1b; }
  .expiry-bar { height: 3px; border-radius: 2px; margin-top: 10px; background: var(--border); overflow: hidden; }
  .expiry-fill { height: 100%; border-radius: 2px; }
  .expiry-fill.good { background: var(--green-light); }
  .expiry-fill.warn { background: var(--amber); }
  .expiry-fill.urgent { background: var(--coral); }

  /* MAP AREA */
  .map-box {
    background: linear-gradient(135deg, #e6f7ee 0%, #d4edda 30%, #bfdbcc 60%, #a8cfc2 100%);
    border-radius: var(--radius-sm); height: 220px; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .map-grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(26,122,74,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(26,122,74,0.07) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .map-pin { position: absolute; width: 26px; height: 26px; background: var(--green); border-radius: 50% 50% 50% 0; transform: rotate(-45deg); box-shadow: 0 2px 8px rgba(26,122,74,0.4); }
  .map-pin::after { content: ''; position: absolute; inset: 4px; background: #fff; border-radius: 50%; }
  .map-pin.amber-pin { background: var(--amber); }
  .map-pin.blue-pin { background: var(--blue); }
  .map-label { position: absolute; background: rgba(255,255,255,0.95); border-radius: 6px; padding: 4px 8px; font-size: 10px; font-weight: 600; color: var(--text); box-shadow: var(--shadow); white-space: nowrap; }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface2); }
  td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .status-dot { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--green-light); }
  .dot-amber { background: var(--amber); }
  .dot-red { background: var(--coral); }
  .dot-blue { background: var(--blue); }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 600; color: var(--text2); }
  input, select, textarea {
    padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'Sora', sans-serif; font-size: 13px; color: var(--text);
    background: var(--surface); outline: none; transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--green); }
  textarea { resize: vertical; min-height: 80px; }
  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius-sm);
    padding: 24px; text-align: center; cursor: pointer; transition: all 0.15s;
    background: var(--bg);
  }
  .upload-zone:hover { border-color: var(--green); background: var(--green-pale); }

  /* CHART BARS */
  .chart-bars { display: flex; gap: 6px; align-items: flex-end; height: 120px; }
  .chart-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.4s; }
  .chart-label { font-size: 9px; color: var(--text3); font-family: 'Space Mono', monospace; }
  
  /* NOTIFICATIONS */
  .notif-list { display: flex; flex-direction: column; gap: 0; }
  .notif-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .notif-item:last-child { border-bottom: none; }
  .notif-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .notif-text { flex: 1; }
  .notif-msg { font-size: 13px; color: var(--text); }
  .notif-time { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-light); flex-shrink: 0; margin-top: 4px; }

  /* MATCHING SCORE */
  .match-card {
    background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
    padding: 16px; display: flex; gap: 14px; align-items: center;
    transition: box-shadow 0.15s; cursor: pointer;
  }
  .match-card:hover { box-shadow: var(--shadow-lg); }
  .match-score {
    width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; font-family: 'Space Mono', monospace; flex-shrink: 0;
  }
  .score-high { background: var(--green-pale); color: var(--green-dark); border: 2px solid var(--green-light); }
  .score-med { background: var(--amber-pale); color: #92400e; border: 2px solid var(--amber); }

  /* PROGRESS RING */
  .ring-container { position: relative; width: 80px; height: 80px; }
  .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-num { font-size: 16px; font-weight: 700; font-family: 'Space Mono', monospace; color: var(--text); }
  .ring-sub { font-size: 9px; color: var(--text3); }

  /* LOGIN SCREEN */
  .login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0d4a2c 0%, #1a7a4a 50%, #2ea866 100%);
    position: relative; overflow: hidden;
  }
  .login-bg-circles { position: absolute; inset: 0; pointer-events: none; }
  .login-card {
    background: #fff; border-radius: 20px; padding: 40px; width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); position: relative; z-index: 1;
  }
  .login-logo { font-size: 28px; font-weight: 700; color: var(--green-dark); margin-bottom: 4px; }
  .login-logo span { color: var(--green-light); }
  .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
  .login-tabs { display: flex; gap: 0; background: var(--bg); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 24px; }
  .login-tab {
    flex: 1; padding: 8px; text-align: center; font-size: 12px; font-weight: 600;
    border-radius: 6px; cursor: pointer; color: var(--text3); transition: all 0.15s;
  }
  .login-tab.active { background: #fff; color: var(--text); box-shadow: var(--shadow); }
  .role-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .role-opt {
    border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 8px;
    text-align: center; cursor: pointer; transition: all 0.15s;
  }
  .role-opt:hover, .role-opt.selected { border-color: var(--green); background: var(--green-pale); }
  .role-opt .role-emoji { font-size: 24px; display: block; margin-bottom: 6px; }
  .role-opt .role-name { font-size: 11px; font-weight: 600; color: var(--text); }
  .divider { height: 1px; background: var(--border); margin: 20px 0; position: relative; }
  .divider span { position: absolute; left: 50%; transform: translateX(-50%); top: -9px; background: #fff; padding: 0 10px; font-size: 11px; color: var(--text3); }
  .social-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 600; background: #fff; color: var(--text); font-family: 'Sora', sans-serif; transition: background 0.15s; }
  .social-btn:hover { background: var(--bg); }

  /* IMPACT BANNER */
  .impact-banner {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
    border-radius: var(--radius); padding: 24px 28px; display: flex; align-items: center; gap: 24px;
    margin-bottom: 28px; color: #fff; position: relative; overflow: hidden;
  }
  .impact-banner::before { content: '🌿'; position: absolute; right: 20px; top: -10px; font-size: 80px; opacity: 0.15; }
  .impact-text .big { font-size: 26px; font-weight: 700; font-family: 'Space Mono', monospace; }
  .impact-text .small { font-size: 12px; opacity: 0.75; margin-top: 3px; }
  .impact-divider { width: 1px; height: 50px; background: rgba(255,255,255,0.2); }

  /* ANIMATIONS */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .page { animation: fadeIn 0.25s ease; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .pulse { animation: pulse 2s ease-in-out infinite; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal { background: #fff; border-radius: 20px; padding: 28px; width: 500px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close { width: 30px; height: 30px; border-radius: 50%; background: var(--bg); border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ADMIN */
  .admin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .admin-card { background: var(--surface); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); text-align: center; }
  .admin-num { font-size: 32px; font-weight: 700; font-family: 'Space Mono', monospace; }
  .admin-label { font-size: 12px; color: var(--text3); margin-top: 4px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ============================================================
// APP STATE
// ============================================================
let state = {
  view: 'login', // login | dashboard | donate | browse | requests | notifications | admin | profile
  user: null,
  role: 'donor',
  activeNav: 'dashboard',
  loginTab: 'login',
  selectedRole: 'donor',
  modal: null,
  donations: [
    { id:1, name:'Fresh Vegetables', qty:'15 kg', type:'fresh', expiry:'2h', emoji:'🥦', donor:'Green Garden Cafe', loc:'Koregaon Park', urgency:'urgent', tags:['Organic','Vegan'], match:96 },
    { id:2, name:'Cooked Rice & Dal', qty:'30 portions', type:'cooked', expiry:'4h', emoji:'🍲', donor:'Hotel Saffron', loc:'Camp', urgency:'warn', tags:['Jain-friendly'], match:88 },
    { id:3, name:'Surplus Bread', qty:'25 loaves', type:'bakery', expiry:'18h', emoji:'🍞', donor:'Sunrise Bakery', loc:'Baner', urgency:'good', tags:['Vegetarian'], match:74 },
    { id:4, name:'Packaged Milk', qty:'40 litres', type:'dairy', expiry:'24h', emoji:'🥛', donor:'Dairy Fresh', loc:'Shivajinagar', urgency:'good', tags:['Pasteurized'], match:91 },
    { id:5, name:'Mixed Fruits', qty:'20 kg', type:'fresh', expiry:'6h', emoji:'🍇', donor:'FruitWala', loc:'Market Yard', urgency:'warn', tags:['Fresh','Seasonal'], match:82 },
    { id:6, name:'Canned Pulses', qty:'50 cans', type:'canned', expiry:'90d', emoji:'🫘', donor:'Retail Surplus', loc:'Hadapsar', urgency:'good', tags:['Non-perishable'], match:67 },
  ],
  requests: [
    { id:1, ngo:'Smile Foundation', food:'Cooked Meals', qty:'50 portions', status:'matched', time:'2h ago', urgency:'high' },
    { id:2, ngo:'Asha Shelter', food:'Vegetables', qty:'10 kg', status:'pending', time:'5h ago', urgency:'medium' },
    { id:3, ngo:'Hope Kitchen', food:'Bread / Bakery', qty:'20 loaves', status:'pickup', time:'1h ago', urgency:'low' },
    { id:4, ngo:'CareFirst NGO', food:'Any food', qty:'30 portions', status:'completed', time:'1d ago', urgency:'medium' },
  ],
  notifications: [
    { icon:'🎯', bg:'#e6f7ee', msg:'AI matched your donation with Smile Foundation NGO (96% match)', time:'2 min ago', unread:true },
    { icon:'🚗', bg:'#eff6ff', msg:'Pickup scheduled for 3:00 PM today — driver en route', time:'30 min ago', unread:true },
    { icon:'✅', bg:'#f0fdf4', msg:'20 kg vegetables successfully delivered to Asha Shelter', time:'2h ago', unread:false },
    { icon:'⚠️', bg:'#fef3c7', msg:'Your donation "Cooked Rice" expires in 2 hours — act now', time:'3h ago', unread:false },
    { icon:'📊', bg:'#f5f3ff', msg:'Weekly report: 148 meals served, 62 kg CO₂ saved this week', time:'1d ago', unread:false },
  ],
};

// ============================================================
// RENDER ENGINE
// ============================================================
function render() {
  const app = document.getElementById('app');
  if (state.view === 'login') { app.innerHTML = renderLogin(); return; }
  app.innerHTML = `
    <div class="layout">
      ${renderSidebar()}
      <main class="main">
        ${renderTopbar()}
        <div class="content page">${renderPage()}</div>
      </main>
    </div>
    ${state.modal ? renderModal() : ''}
  `;
  bindEvents();
}

// ============================================================
// LOGIN
// ============================================================
function renderLogin() {
  const roles = [
    {id:'donor', emoji:'🏪', name:'Donor'},
    {id:'receiver', emoji:'🤲', name:'Receiver'},
    {id:'admin', emoji:'⚙️', name:'Admin'},
  ];
  return `
  <div class="login-screen">
    <svg class="login-bg-circles" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <circle cx="700" cy="100" r="200" fill="rgba(255,255,255,0.04)"/>

function renderSidebar() {
  const isDonor = state.user?.role === 'donor';
  const isReceiver = state.user?.role === 'receiver';
  const isAdmin = state.user?.role === 'admin';

  const navItems = [
    { icon:'📊', label:'Dashboard', id:'dashboard', section:'Main' },
    ...(isDonor ? [{ icon:'➕', label:'New Donation', id:'donate', badge:'' }] : []),
    ...(isReceiver ? [{ icon:'🔍', label:'Browse Food', id:'browse' }] : []),
    ...(!isAdmin ? [{ icon:'📦', label:isDonor?'My Donations':'My Requests', id:'requests' }] : []),
    ...(isAdmin ? [] : [{ icon:'🎯', label:'Matches', id:'matches' }]),
    { icon:'🔔', label:'Notifications', id:'notifications', badge:'2', section:'Activity' },
    ...(isAdmin ? [{ icon:'👥', label:'Users', id:'users', section:'Admin' }, { icon:'📋', label:'Reports', id:'reports' }, { icon:'⚙️', label:'Settings', id:'settings' }] : []),
    { icon:'👤', label:'Profile', id:'profile', section:'Account' },
  ];

  let lastSection = '';
  const navHtml = navItems.map(item => {
    let sectionHtml = '';
    if (item.section && item.section !== lastSection) {
      lastSection = item.section;
      sectionHtml = `<div class="nav-section">${item.section}</div>`;
    }
    return `${sectionHtml}<div class="nav-item ${state.activeNav===item.id?'active':''}" onclick="navigate('${item.id}')">
      <span class="icon">${item.icon}</span> ${item.label}
      ${item.badge ? `<span class="badge">${item.badge}</span>` : ''}
    </div>`;
  }).join('');

  const roleEmoji = { donor:'🏪', receiver:'🤲', admin:'⚙️' }[state.user?.role];
  const roleName = { donor:'Green Garden Cafe', receiver:'Smile Foundation', admin:'Admin Panel' }[state.user?.role];

  return `
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">Food<span>Bridge</span></div>
      <div class="tagline">Zero Waste Platform</div>
    </div>
    <div class="sidebar-role">
      <div class="role-badge">${roleEmoji}</div>
      <div>
        <div class="role-name">${roleName}</div>
        <div class="role-type">${state.user?.role}</div>
      </div>
    </div>
    ${navHtml}
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">← Sign Out</button>
    </div>
  </nav>`;
}

// ============================================================
// PAGES
// ============================================================
function renderPage() {
  switch(state.activeNav) {
    case 'dashboard': return renderDashboard();
    case 'donate': return renderDonate();
    case 'browse': return renderBrowse();
    case 'requests': return renderRequests();
    case 'matches': return renderMatches();
    case 'notifications': return renderNotifications();
    case 'profile': return renderProfile();
    case 'users': case 'reports': case 'settings': return renderAdmin();
    default: return renderDashboard();
  }
}

  <div class="card" style="margin-top:20px">
    <div class="card-header"><span class="card-title">📡 Notification Channels</span></div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${[
          {icon:'📧', name:'Email', via:'SendGrid', enabled:true},
          {icon:'📱', name:'SMS', via:'Twilio', enabled:true},
          {icon:'🔔', name:'Push', via:'Firebase FCM', enabled:false},
          {icon:'💬', name:'WhatsApp', via:'Twilio', enabled:false},
        ].map(c => `<div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg);border-radius:var(--radius-sm)">
          <span style="font-size:22px">${c.icon}</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${c.name}</div>
            <div style="font-size:11px;color:var(--text3)">via ${c.via}</div>
          </div>
          <div style="width:44px;height:24px;background:${c.enabled?'var(--green-light)':'var(--border)'};border-radius:12px;cursor:pointer;position:relative;transition:background 0.15s" onclick="this.style.background=this.style.background==='' || this.style.background.includes('border')?' var(--green-light)':'var(--border)'">

        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ============================================================
// MODAL
// ============================================================
function renderModal() {
  const { type, data } = state.modal;
  let content = '';

  if (type === 'food') {
    const d = state.donations.find(x => x.id === parseInt(data));
    content = d ? `
      <div style="text-align:center;font-size:60px;padding:20px;background:var(--green-pale);border-radius:var(--radius-sm);margin-bottom:20px">${d.emoji}</div>
      <div class="form-grid">
        <div><label>Food</label><div style="font-size:15px;font-weight:700;margin-top:4px">${d.name}</div></div>
        <div><label>Quantity</label><div style="font-size:15px;font-weight:700;margin-top:4px">${d.qty}</div></div>
        <div><label>Donor</label><div style="margin-top:4px;color:var(--text2)">${d.donor}</div></div>
        <div><label>Location</label><div style="margin-top:4px;color:var(--text2)">📍 ${d.loc}</div></div>
        <div><label>Expires In</label><div style="margin-top:4px"><span class="tag ${d.urgency==='urgent'?'tag-coral':d.urgency==='warn'?'tag-amber':'tag-green'}">${d.expiry}</span></div></div>
        <div><label>AI Match</label><div style="margin-top:4px"><span class="tag tag-blue">🎯 ${d.match}% for you</span></div></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn btn-primary" style="flex:1" onclick="openModal('request',${d.id})">Request Pickup</button>
        <button class="btn btn-outline" onclick="closeModal()">Close</button>
      </div>` : '';
  } else if (type === 'request') {
    const d = state.donations.find(x => x.id === parseInt(data));
    content = `
      <p style="font-size:14px;color:var(--text2);margin-bottom:20px">Schedule a pickup for <strong>${d?.name || 'this donation'}</strong></p>
      <div class="form-group" style="margin-bottom:14px"><label>Preferred Pickup Date</label><input type="date"/></div>
      <div class="form-group" style="margin-bottom:14px"><label>Preferred Time</label><input type="time" value="14:00"/></div>
      <div class="form-group" style="margin-bottom:20px"><label>Number of People to Feed</label><input type="number" placeholder="50"/></div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" style="flex:1" onclick="submitRequest()">Confirm Request</button>
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      </div>`;
  } else if (type === 'match') {
    content = `
      <p style="font-size:14px;color:var(--text2);margin-bottom:20px">Confirm AI match with <strong>${data}</strong>?</p>
      <div style="padding:14px;background:var(--green-pale);border-radius:var(--radius-sm);margin-bottom:20px">
        <div style="font-size:13px;color:var(--green-dark)">✅ Both parties will be notified via SMS & email<br>✅ Pickup schedule will be auto-suggested<br>✅ Live tracking link will be shared</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" style="flex:1" onclick="alert('Match confirmed! 🎉 ${data} has been notified.');closeModal()">Confirm Match</button>
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      </div>`;
  }

  const titles = { food:'Food Details', request:'Schedule Pickup', match:'Confirm Match' };
  return `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${titles[type] || 'Details'}</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      ${content}
    </div>
  </div>`;
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function bindEvents() {}

function setLoginTab(tab) { state.loginTab = tab; render(); }
function selectRole(role) { state.selectedRole = role; render(); }

function doLogin(role) {
  state.user = { role: role || state.selectedRole };
  state.view = 'app';
  state.activeNav = 'dashboard';
  render();
}

function doLogout() {
  state.user = null;
  state.view = 'login';
  state.loginTab = 'login';
  render();
}

function navigate(page) {
  state.activeNav = page;
  state.modal = null;
  render();
  window.scrollTo(0, 0);
}

function openModal(type, data) {
  state.modal = { type, data };
  render();
}

function closeModal() {
  state.modal = null;
  render();
}

function submitDonation() {
  alert('✅ Donation listed successfully!\n\n🤖 AI matching started — you\'ll receive SMS + email when matched.\n\n🌱 Estimated impact: 30 meals, 12 kg CO₂ saved.');
  navigate('requests');
}

function submitRequest() {
  alert('✅ Pickup request submitted!\n\n📱 You\'ll receive a confirmation SMS from the donor.\n⏰ Expected response within 30 minutes.');
  navigate('requests');
}

// ============================================================
// INIT
// ============================================================
render();
</script>
